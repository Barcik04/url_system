spring.application.name=url_system

# Datasource always from Testcontainers (no base class needed)
spring.datasource.url=jdbc:tc:postgresql:17-alpine:///testdb
spring.datasource.username=test
spring.datasource.password=test
##spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Optional: quieter logs
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.testcontainers=INFO

server.port=0

#EMAIL
app.publicBaseUrl=http://localhost:8080

#AWS
spring.autoconfigure.exclude=io.awspring.cloud.autoconfigure.sqs.SqsAutoConfiguration
app.s3.avatars.bucket=test-bucket
app.s3.avatars.region=eu-north-1
app.s3.avatars.keyPrefix=avatars
app.s3.avatars.presignTtlSeconds=600


#JWT
