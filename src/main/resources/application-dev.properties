spring.application.name=url_system
spring.datasource.url=jdbc:postgresql://localhost:5309/url_system
spring.datasource.username=igor
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver



# JPA / Hibernate (common)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# Flyway (common)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#JWT
spring.app.jwtSecret=VGhpc0lzQVNlY3JldEtleU5lZWRzQXQhTGVhc3QzMkJ5dGVzIQ==
spring.app.jwtExpirationMs=3000000

# Actuator (common)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.enable.http=true


# Logging defaults (common)
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - [%X{requestId}] %msg%n
