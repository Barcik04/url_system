spring.application.name=url_system
server.port=${SERVER_PORT:8080}

# =====================
# DB (RDS)
# =====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari (prod)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT_MS:3000}

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =====================
# Security / JWT
# =====================
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS:3000000}

# =====================
# Redis (ElastiCache)
# =====================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:5000ms}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT_MS:5000ms}


# =====================
# Observability / Actuator (ALB/ECS-friendly)
# =====================

management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,ratelimiters,retries,bulkheads
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

management.metrics.tags.application=${spring.application.name}
management.metrics.tags.env=prod



# =====================
# Logging
# =====================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - [%X{requestId}] %msg%n

# =====================
# Email (temporary SMTP) - ok for first deploy
# =====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.checkserveridentity=true
app.publicBaseUrl=${PUBLIC_BASE_URL:url-alb-13546580.eu-north-1.elb.amazonaws.com}


# ===============
# S3 Avatars
# ===============
app.s3.avatars.bucket=url-system-avatars
app.s3.avatars.region=eu-north-1
app.s3.avatars.keyPrefix=avatars
app.s3.avatars.presignTtlSeconds=600


# ================
# SQS
# ================
app.sqs.emailQueue=${EMAIL_QUEUE_NAME:url-email-queue}
spring.cloud.aws.region.static=eu-north-1
app.sqs.enabled=${APP_SQS_ENABLED:true}


# ================
# STRIPE
# ================
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.premium-price-id=${STRIPE_PREMIUM_PRICE_ID}
stripe.success-url=${STRIPE_SUCCESS_URL}
stripe.cancel-url=${STRIPE_CANCEL_URL}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}



##### OPEN AI

spring.ai.model.chat=openai
spring.ai.model.embedding=openai

spring.ai.openai.base-url=https://openrouter.ai/api

# chat
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=stepfun/step-3.5-flash:free

# embeddings
spring.ai.openai.embedding.api-key=${OPENROUTER_EMBEDDING_API_KEY}
spring.ai.openai.embedding.options.model=qwen/qwen3-embedding-8b







# How long to wait for a connection from the pool
spring.jpa.properties.hibernate.jdbc.timeout=2



# =====================
# Resilience4j - CircuitBreaker
# =====================
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

resilience4j.circuitbreaker.configs.default.recordExceptions[0]=org.springframework.dao.DataAccessException


resilience4j.circuitbreaker.instances.baseService.baseConfig=default
resilience4j.circuitbreaker.instances.baseService.slidingWindowSize=20
resilience4j.circuitbreaker.instances.baseService.waitDurationInOpenState=30s

resilience4j.circuitbreaker.instances.paymentService.baseConfig=default
resilience4j.circuitbreaker.instances.paymentService.failureRateThreshold=40
resilience4j.circuitbreaker.instances.paymentService.slowCallRateThreshold=60
resilience4j.circuitbreaker.instances.paymentService.slowCallDurationThreshold=2s


# =====================
# Resilience4j - Retry
# =====================
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1000
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2

# Retry only transient infra problems
resilience4j.retry.instances.baseService.retryExceptions[0]=org.springframework.dao.DataAccessException
resilience4j.retry.instances.baseService.retryExceptions[1]=org.springframework.dao.QueryTimeoutException
resilience4j.retry.instances.baseService.retryExceptions[2]=org.springframework.dao.DataAccessResourceFailureException

# Never retry business/domain exceptions
resilience4j.retry.instances.baseService.ignoreExceptions[0]=java.util.NoSuchElementException
resilience4j.retry.instances.baseService.ignoreExceptions[1]=com.example.url_system.exceptions.UrlExpiredException



resilience4j.retry.instances.baseService.baseConfig=default
resilience4j.retry.instances.baseService.maxAttempts=4
resilience4j.retry.instances.baseService.waitDuration=500
resilience4j.retry.instances.baseService.enableExponentialBackoff=true
resilience4j.retry.instances.baseService.exponentialBackoffMultiplier=2

resilience4j.retry.instances.databaseService.maxAttempts=2
resilience4j.retry.instances.databaseService.waitDuration=100



# =====================
# Resilience4j - Bulkhead
# =====================
resilience4j.bulkhead.configs.default.maxConcurrentCalls=25
resilience4j.bulkhead.configs.default.maxWaitDuration=100ms

resilience4j.bulkhead.instances.baseService.baseConfig=default
resilience4j.bulkhead.instances.baseService.maxConcurrentCalls=10

resilience4j.bulkhead.instances.databaseService.maxConcurrentCalls=50


# =====================
# Resilience4j - ThreadPoolBulkhead
# =====================
resilience4j.thread-pool-bulkhead.configs.default.maxThreadPoolSize=4
resilience4j.thread-pool-bulkhead.configs.default.coreThreadPoolSize=2
resilience4j.thread-pool-bulkhead.configs.default.queueCapacity=100
resilience4j.thread-pool-bulkhead.configs.default.keepAliveDuration=20ms

resilience4j.thread-pool-bulkhead.instances.heavyOperation.baseConfig=default
resilience4j.thread-pool-bulkhead.instances.heavyOperation.maxThreadPoolSize=8
resilience4j.thread-pool-bulkhead.instances.heavyOperation.coreThreadPoolSize=4


# =====================
# Resilience4j - TimeLimiter
# =====================
resilience4j.timelimiter.configs.default.cancelRunningFuture=true
resilience4j.timelimiter.configs.default.timeoutDuration=2s

resilience4j.timelimiter.instances.baseService.baseConfig=default
resilience4j.timelimiter.instances.baseService.timeoutDuration=3s

resilience4j.timelimiter.instances.quickOperation.timeoutDuration=1s